<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App - Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg-gradient: linear-gradient(135deg, #f8fafc, #e2e8f0);
  --sidebar-bg: rgba(255, 255, 255, 0.8);
  --card: rgba(255, 255, 255, 0.7);
  --border: rgba(255, 255, 255, 0.6);
  --border-subtle: rgba(148, 163, 184, 0.2);
  --text: #0f172a;
  --muted: #64748b;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-glow: rgba(79, 70, 229, 0.3);
  --primary-text: #ffffff;
  --success: #10b981;
  --danger: #ef4444;
  --radius: 24px;
  --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 20px 40px -5px rgba(0, 0, 0, 0.1);
  --input-bg: rgba(255, 255, 255, 0.9);
}

body.dark {
  --bg-gradient: linear-gradient(135deg, #020617, #0f172a);
  --sidebar-bg: rgba(15, 23, 42, 0.7);
  --card: rgba(30, 41, 59, 0.6);
  --border: rgba(255, 255, 255, 0.08);
  --border-subtle: rgba(255, 255, 255, 0.05);
  --text: #f8fafc;
  --muted: #94a3b8;
  --primary: #6366f1;
  --primary-hover: #818cf8;
  --primary-glow: rgba(99, 102, 241, 0.3);
  --primary-text: #ffffff;
  --success: #22c55e;
  --danger: #f87171;
  --input-bg: rgba(15, 23, 42, 0.8);
}

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  transition: background 0.4s ease, color 0.4s ease;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.layout { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: sticky;
  top: 0;
  height: 100vh;
  box-sizing: border-box;
  z-index: 10;
  transition: all 0.3s ease;
}

.logo {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo i { font-size: 28px; color: var(--primary); -webkit-text-fill-color: initial; }

.sidebar nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }

.sidebar nav a {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-radius: 16px;
  color: var(--muted); text-decoration: none;
  font-weight: 500; font-size: 16px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid transparent;
}

.sidebar nav a i { font-size: 20px; transition: transform 0.3s ease; }
.sidebar nav a:hover {
  background: rgba(99, 102, 241, 0.08); color: var(--text); transform: translateX(4px);
}
.sidebar nav a.active {
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.15));
  color: var(--primary); border-color: rgba(99,102,241,0.2); font-weight: 600;
}
.sidebar nav a.active i { color: var(--primary); }

.bottom-actions { display: flex; flex-direction: column; gap: 12px; margin-top: auto; }

.btn-sidebar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px; border-radius: 16px; font-weight: 600; font-size: 15px;
  cursor: pointer; transition: all 0.3s ease;
  border: 1px solid var(--border-subtle); background: transparent; color: var(--text);
}
.btn-sidebar:hover { background: var(--border-subtle); transform: translateY(-2px); }

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  padding: 40px 60px;
  position: relative;
  z-index: 1;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.container { max-width: 1200px; margin: auto; }

h2, h3 { font-weight: 600; margin: 0 0 20px 0; letter-spacing: -0.5px; }
h2 { font-size: 24px; }
h3 { font-size: 18px; color: var(--muted); }

/* ===== CARD ===== */
.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 32px;
  margin-bottom: 32px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  transition: all 0.4s ease;
}

.card:hover { box-shadow: var(--shadow-lg); }

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 40px;
  background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(16,185,129,0.1));
  border: 1px solid rgba(34,197,94,0.2);
}

.hero h1 { margin: 0 0 10px 0; font-size: 36px; font-weight: 700; letter-spacing: -1px; }
.hero .muted { font-size: 18px; margin: 0; }

/* ===== BUTTONS & INPUTS ===== */
button {
  padding: 12px 20px; border-radius: 14px; font-weight: 600; font-family: inherit;
  font-size: 15px; border: none; cursor: pointer; transition: all 0.3s ease;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
button:active { transform: translateY(1px) !important; }

.btn-primary {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(16,185,129,0.4); }

.btn-danger-icon {
  background: rgba(239, 68, 68, 0.1); color: var(--danger);
  padding: 8px 12px; border-radius: 10px; font-size: 16px;
}
.btn-danger-icon:hover { background: rgba(239, 68, 68, 0.2); transform: scale(1.05); }

input {
  background: var(--input-bg); border: 1px solid var(--border-subtle);
  color: var(--text); padding: 12px 16px; border-radius: 14px;
  outline: none; font-family: inherit; font-size: 15px; transition: all 0.3s ease;
  width: 100%; box-sizing: border-box;
}
input:focus { border-color: var(--success); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }

.input-group {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  gap: 16px;
  align-items: end;
}

/* ===== STOCK LIST ===== */
.stock-list { display: flex; flex-direction: column; gap: 12px; }

.stock-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  align-items: center;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(0,0,0,0.02);
  border: 1px solid var(--border-subtle);
  transition: all 0.2s;
}

body.dark .stock-row { background: rgba(255,255,255,0.02); }
.stock-row:hover { background: rgba(0,0,0,0.04); transform: translateX(4px); }
body.dark .stock-row:hover { background: rgba(255,255,255,0.04); }

.stock-symbol {
  font-weight: 700; font-size: 18px; color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.stock-symbol .icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(16,185,129,0.1); color: var(--success);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}

.stock-qty, .stock-price { font-size: 15px; font-weight: 500; color: var(--muted); }
.stock-total { font-weight: 600; font-size: 16px; color: var(--text); }

/* Ambient Glow Backgrounds */
.ambient-glow-1, .ambient-glow-2 {
  position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.3; pointer-events: none;
}
.ambient-glow-1 {
  width: 500px; height: 500px; background: rgba(16, 185, 129, 0.2); top: -150px; left: 300px;
}
.ambient-glow-2 {
  width: 600px; height: 600px; background: rgba(59, 130, 246, 0.15); bottom: -200px; right: -100px;
}

/* Portfolio Summary */
.portfolio-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 24px;
}

.summary-item {
  background: var(--bg-gradient); padding: 24px; border-radius: 16px;
  border: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 8px;
}
.summary-item h4 { margin: 0; color: var(--muted); font-size: 15px; font-weight: 500; }
.summary-item h2 { margin: 0; font-size: 32px; font-weight: 700; color: var(--text); }

/* Toast */
#toast {
  position: fixed; bottom: 30px; right: 30px; background: var(--text); color: var(--bg-gradient);
  padding: 16px 24px; border-radius: 16px; font-weight: 500; opacity: 0; transition: all 0.3s ease;
  pointer-events: none; z-index: 2000; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; transform: translateY(20px);
}
#toast.show { opacity: 1; transform: translateY(0); }
body.dark #toast { background: var(--text); color: #0f172a; }

@media (max-width: 900px) {
  .input-group { grid-template-columns: 1fr; }
  .stock-row { grid-template-columns: 1fr; gap: 12px; }
  .btn-primary { grid-column: 1 / -1; }
}
</style>
</head>

<body>
<div class="ambient-glow-1"></div>
<div class="ambient-glow-2"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="logo">
        <i class="ri-wallet-3-fill"></i> Finance
      </div>
      <nav>
        <a href="home.html"><i class="ri-home-5-line"></i> Home</a>
        <a href="dashboard.html"><i class="ri-dashboard-3-line"></i> Dashboard</a>
        <a href="analytics.html"><i class="ri-pie-chart-2-line"></i> Analytics</a>
        <a href="stock.html" class="active"><i class="ri-stock-line"></i> Investments</a>
        <a href="splitwise.html"><i class="ri-group-line"></i> Split Expenses</a>
        <a href="emi.html"><i class="ri-bank-card-line"></i> EMI & Subs</a>
      </nav>
    </div>

    <div class="bottom-actions">
      <button class="btn-sidebar"  id="themeBtn">
        <i class="ri-moon-line"></i> <span>Dark Mode</span>
      </button>
      <button class="btn-sidebar btn-danger" onclick="logout()">
        <i class="ri-logout-box-r-line"></i> <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="container">

      <div class="hero card">
        <div>
          <h1>Stock Portfolio</h1>
          <p class="muted">Track your investments and watch your wealth grow.</p>
        </div>
        <i class="ri-line-chart-line" style="font-size: 64px; color: var(--success); opacity: 0.8;"></i>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start;">
        
        <!-- Add Stock & List -->
        <div style="display: flex; flex-direction: column; gap: 32px;">
          <div class="card" style="margin-bottom:0;">
            <h2><i class="ri-add-circle-fill" style="color:var(--success)"></i> Add New Asset</h2>
            <div class="input-group">
              <div>
                <label class="muted" style="font-size: 13px; margin-bottom: 6px; display: block;">Symbol/Name</label>
                <input id="symbol" placeholder="e.g. RELIANCE">
              </div>
              <div>
                <label class="muted" style="font-size: 13px; margin-bottom: 6px; display: block;">Quantity</label>
                <input id="qty" type="number" placeholder="0" min="1">
              </div>
              <div>
                <label class="muted" style="font-size: 13px; margin-bottom: 6px; display: block;">Buy Price (₹)</label>
                <input id="price" type="number" placeholder="0.00" min="0" step="0.01">
              </div>
              <button class="btn-primary" onclick="addStock()" style="height: 46px;"><i class="ri-add-line"></i> Add</button>
            </div>
          </div>

          <div class="card" style="margin-bottom:0;">
            <h3>Your Holdings</h3>
            <div id="stockList" class="stock-list">
              <!-- Rendered via JS -->
            </div>
          </div>
        </div>

        <!-- Portfolio Chart & Summary -->
        <div style="display: flex; flex-direction: column; gap: 32px;">
          <div class="card" style="margin-bottom:0;">
            <h3>Portfolio Distribution</h3>
            <div style="position:relative; width:100%; height:250px; display:flex; justify-content:center;">
              <canvas id="portfolioChart"></canvas>
            </div>
          </div>

          <div class="card" style="background: linear-gradient(135deg, rgba(16,185,129,0.05), rgba(59,130,246,0.05)); margin-bottom:0;">
            <h3>Portfolio Summary</h3>
            <div class="portfolio-summary">
              <div class="summary-item">
                <h4>Total Invested</h4>
                <h2 id="totalInvestedAmount">₹0</h2>
              </div>
              <div class="summary-item">
                <h4>Total Assets</h4>
                <h2 id="totalAssetCount">0</h2>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>
</div>

<div id="toast"><i class="ri-checkbox-circle-fill" style="color:var(--success); font-size:20px;"></i> <span id="toastMsg">Success</span></div>

<script>
/* Theme & Common Logic */
function updateThemeIcon() {
  const btnIcon = document.querySelector("#themeBtn i");
  const btnText = document.querySelector("#themeBtn span");
  if (document.body.classList.contains("dark")) {
    btnIcon.className = "ri-sun-line";
    btnText.innerText = "Light Mode";
  } else {
    btnIcon.className = "ri-moon-line";
    btnText.innerText = "Dark Mode";
  }
}

if(!localStorage.getItem("theme")) localStorage.setItem("theme", "dark");
if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark");
updateThemeIcon();

const tBtn = document.getElementById("themeBtn");
if(tBtn) {
  tBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark")?"dark":"light");
    updateThemeIcon();
    renderChart(); // Redraw chart for theme colors
  });
}

function showToast(message){
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").innerText = message;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 3000);
}

// Simple Number Animation
function animateValue(obj, start, end, duration) {
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    const easeOut = 1 - Math.pow(1 - progress, 3);
    const current = Math.floor(easeOut * (end - start) + start);
    obj.innerHTML = `₹${current.toLocaleString('en-IN')}`;
    if (progress < 1) window.requestAnimationFrame(step);
    else obj.innerHTML = `₹${end.toLocaleString('en-IN')}`;
  };
  window.requestAnimationFrame(step);
}

const API = "";
const TOKEN = localStorage.getItem("token");

/* Stock Logic */
let stocks = [];
let portfolioChart;

async function loadStocks() {
  try {
    const res = await fetch(API + "/stocks", {
      headers: { Authorization: "Bearer " + TOKEN }
    });
    stocks = await res.json();
    
    // Migration logic
    const local = JSON.parse(localStorage.getItem("stocks") || "[]");
    if (stocks.length === 0 && local.length > 0) {
      console.log("Migrating local stocks to cloud...");
      for (const st of local) {
        await fetch(API + "/stocks", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
          body: JSON.stringify({ symbol: st.symbol, qty: st.qty, price: st.price })
        });
      }
      localStorage.removeItem("stocks");
      return loadStocks();
    }
  } catch (e) {
    console.error("Load stocks error", e);
  }
}

async function addStock(){
  const s = document.getElementById('symbol').value.toUpperCase();
  const q = Number(document.getElementById('qty').value);
  const p = Number(document.getElementById('price').value);
  
  if(!s || q <= 0 || p <= 0) {
    alert("Please fill all valid details.");
    return;
  }

  try {
    await fetch(API + "/stocks", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
      body: JSON.stringify({ symbol: s, qty: q, price: p })
    });
    
    // Clear inputs
    document.getElementById('symbol').value = '';
    document.getElementById('qty').value = '';
    document.getElementById('price').value = '';
    
    await loadStocks();
    render();
    showToast("Asset Added 📈");
  } catch (e) {
    alert("Failed to add stock");
  }
}

async function removeStock(id) {
  if(confirm("Are you sure you want to remove this asset?")) {
    try {
      await fetch(API + `/stocks/${id}`, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + TOKEN }
      });
      await loadStocks();
      render();
      showToast("Asset Removed 🗑️");
    } catch (e) {
      alert("Failed to remove asset");
    }
  }
}

/* Chart Rendering */
const chartColors = ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ec4899', '#06b6d4', '#f43f5e'];

function renderChart() {
  if(stocks.length === 0) {
    if(portfolioChart) { portfolioChart.destroy(); portfolioChart = null; }
    return;
  }

  const isDark = document.body.classList.contains("dark");
  const textColor = isDark ? '#f8fafc' : '#0f172a';
  
  const labels = stocks.map(st => st.symbol);
  const data = stocks.map(st => st.qty * st.price);

  const ctx = document.getElementById('portfolioChart').getContext('2d');
  
  if(portfolioChart) portfolioChart.destroy();
  
  portfolioChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: chartColors,
        borderWidth: isDark ? 4 : 2,
        borderColor: isDark ? '#1e293b' : '#ffffff',
        hoverOffset: 15
      }]
    },
    options: {
      cutout: '70%',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: {
            color: textColor,
            font: { family: "'Outfit', sans-serif", size: 13, weight: 500 },
            usePointStyle: true,
            boxWidth: 8
          }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const value = context.raw;
              return `₹${value.toLocaleString('en-IN')}`;
            }
          }
        }
      }
    }
  });
}

function render(){
  const list = document.getElementById('stockList');
  list.innerHTML="";
  
  let totalInvested = 0;

  if(stocks.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--muted);">No assets in portfolio yet.</div>`;
    document.getElementById('totalAssetCount').innerText = "0";
    animateValue(document.getElementById('totalInvestedAmount'), 0, 0, 500);
    renderChart();
    return;
  }

  stocks.forEach((st, index) => {
    // Ensure backwards compatibility for old data without IDs
    const currentId = st.id || st.symbol; 
    const totalVal = st.qty * st.price;
    totalInvested += totalVal;
    
    // Assign a color from palette based on index
    const color = chartColors[index % chartColors.length];

    list.innerHTML+=`
      <div class="stock-row">
        <div class="stock-symbol">
          <div class="icon" style="background: ${color}22; color: ${color};"><i class="ri-stock-line"></i></div>
          ${st.symbol}
        </div>
        <div class="stock-qty">${st.qty} Shares</div>
        <div class="stock-price">Avg ₹${st.price.toLocaleString('en-IN')}</div>
        <div class="stock-total">₹${totalVal.toLocaleString('en-IN')}</div>
        <button class="btn-danger-icon" onclick="removeStock(${typeof currentId === 'string' ? `'${currentId}'` : currentId})">
          <i class="ri-delete-bin-line"></i>
        </button>
      </div>
    `;
  });
  
  document.getElementById('totalAssetCount').innerText = stocks.length;
  // Use a simpler assignment for initial load, then animate future changes if desired, 
  // but for consistency we animate it here.
  const totalInvestedEl = document.getElementById('totalInvestedAmount');
  animateValue(totalInvestedEl, 0, totalInvested, 800);
  
  renderChart();
}

window.logout = function(){
  localStorage.removeItem("token");
  location.href="index.html";
};

async function initPage() {
  await loadStocks();
  render();
}

initPage();
</script>
</body>
</html>
